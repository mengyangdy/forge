  "@iconify-json/uil": ^1.2.3
  msw: ^2.14.6
  "@douyinfe/semi-illustrations": ^2.101.0
  ai: ^7.0.31
  "@ai-sdk/openai": ^4.0.16
  react-markdown: ^10.1.0
  remark-gfm: ^4.0.1
  remark-math: ^6.0.0
  rehype-katex: ^7.0.1
  react-syntax-highlighter: ^16.1.1
  katex: ^0.18.1
  "@types/react-syntax-highlighter": ^15.5.13

catalogs:
  # ==================== 核心基础依赖 ====================
  core:
    # React 生态核心
    react: 19.1.0
    react-dom: 19.1.0
    "react-error-boundary": 6.0.0

    # TypeScript 和构建工具
    typescript: ^6.0.3
    vite: npm:@voidzero-dev/vite-plus-core@latest

    # 状态管理
    "@tanstack/react-query": ^5.90.12

  # ==================== 开发工具 ====================
  dev:
    # 类型定义
    "@types/node": ^24.10.2
    "@types/react": ^19.2.7
    "@types/react-dom": ^19.2.3
    "@types/babel__core": ^7.20.5
    "@types/crypto-js": ^4.2.2
    "@types/nprogress": ^0.2.3
    "@types/qs": ^6.14.0

    # 构建和打包工具
    "@babel/core": ^7.29.0
    "@babel/template": ^7.28.6
    tsdown: ^0.18.2
    tsx: ^4.21.0
    turbo: ^2.7.1
    rimraf: ^6.0.1

    # 代码质量工具
    eslint: ^9.39.2
    "@soybeanjs/eslint-config": ^1.7.4
    oxlint: ^1.60.0

    # 测试工具
    vitest: 4.1.10
    "@vitest/coverage-v8": 4.1.10
    jsdom: ^28.0.0
    happy-dom: 20.6.1
    "@playwright/test": ^1.59.1
    "@testing-library/react": ^16.3.2
    "@testing-library/jest-dom": ^6.9.1
    "@testing-library/user-event": ^14.6.1
    msw: ^2.7.0

    # ESLint 插件
    "eslint-plugin-react": ^7.37.5
    "eslint-plugin-react-hooks": ^7.0.1
    "eslint-plugin-react-refresh": ^0.4.24
    "eslint-plugin-sort": ^4.0.0

    # UnoCSS 相关
    "@unocss/core": ^66.5.10
    "@unocss/eslint-config": ^66.5.10
    "@unocss/preset-icons": ^66.5.10
    "@unocss/preset-mini": ^66.5.10
    "@unocss/preset-uno": ^66.5.10
    "@unocss/preset-wind3": ^66.5.10
    "@unocss/transformer-directives": ^66.5.10
    "@unocss/transformer-variant-group": ^66.5.10

    # Vite 插件
    "@rolldown/plugin-babel": ^0.2.3
    "vite-plugin-inspect": ^12.0.0-beta.2
    "vite-plugin-remove-console": ^2.2.0
    "vite-plugin-svg-icons": ^2.0.1

    # 其他开发工具
    "babel-plugin-react-compiler": ^1.0.0
    "unplugin-auto-import": ^20.3.0
    "unplugin-icons": ^22.5.0
    typed-css-modules: ^0.9.1

    # 工程化工具
    # Git 工具
    "simple-git-hooks": ^2.13.1
    "@soybeanjs/changelog": ^0.3.24
    # 包管理工具
    bumpp: ^10.0.3
    "npm-check-updates": ^17.1.14
    # 配置和执行工具
    c12: ^2.0.4
    cac: ^6.7.14
    enquirer: ^2.4.1
    execa: ^9.5.2
    # 终端美化工具
    boxen: ^8.0.1
    "gradient-string": ^3.0.0
    kolorist: ^1.8.0
    # 文件处理工具
    "fast-glob": ^3.3.3
    picomatch: ^4.0.3

  # ==================== Web 前端专用 ====================
  web:
    # React Web 专用
    "@vitejs/plugin-react": 6.0.2
    "@tanstack/react-router": ^1.140.0
    "@tanstack/router-generator": ^1.140.0
    "@tanstack/router-plugin": ^1.140.0

    # UI 组件库
    "@douyinfe/semi-ui": ^2.101.0
    "@douyinfe/semi-icons": ^2.101.0

    # 样式工具
    "@unocss/vite": ^66.5.10
    sass: ^1.96.0

    # 数据可视化
    echarts: ^6.0.0

    # 滚动库
    "@better-scroll/core": ^2.5.1

    # SVG 工具
    "@svgr/core": ^8.1.0
    "@svgr/plugin-jsx": ^8.1.0

    # 开发者工具
    "@tanstack/react-query-devtools": ^5.91.1
    "@tanstack/react-devtools": ^0.8.4
    "@tanstack/devtools-vite": ^0.7.0
    "@tanstack/react-router-devtools": ^1.140.0

  # ==================== 共享工具库 ====================
  utils:
    # 通用工具
    temporal-polyfill: ^0.3.0
    date-fns: ^4.1.0
    nanoid: ^5.0.9
    clsx: ^2.1.1
    colord: ^2.9.3
    klona: ^2.0.6
    "crypto-js": ^4.2.0
    localforage: ^1.10.0
    "tailwind-merge": ^3.4.0
    "tailwind-variants": ^3.2.2
    defu: ^6.1.4
    ahooks: ^3.9.6
    zod: ^4.1.13

    # 网络请求
    axios: ^1.7.9
    "axios-retry": ^4.5.0
    qs: ^6.14.0

  # ==================== UI 组件共享 ====================
  ui-shared:
    # Radix UI
    "@radix-ui/react-scroll-area": 1.2.10
    "@radix-ui/react-slot": 1.2.3
    "@radix-ui/react-tooltip": 1.2.7
    # 动画
    motion: ^12.23.26

    # 图标
    "@iconify/react": ^6.0.2
    "@iconify/json": ^2.2.416
    "@iconify/types": ^2.0.0
    "@iconify/utils": ^3.1.0

    # 其他 UI 工具
    nprogress: ^0.2.0

  # ==================== 国际化 ====================
  i18n:
    i18next: 25.7.2
    react-i18next: 16.4.0

  # ==================== CSS / PostCSS ====================
  css:
    tailwindcss: ^4.1.18
    "@tailwindcss/cli": ^4.1.18
    "@tailwindcss/postcss": ^4.1.13
    postcss: ^8.5.6

  # ==================== peer 依赖管理 ====================
  peer:
    react: 19.2.1
    react-dom: 19.2.1

overrides:
  vite: "catalog:"
  vitest: "catalog:"
  "@types/react": ^19.2.7
  "@types/react-dom": ^19.2.3
  typescript: ^6.0.3
  "@voidzero-dev/vite-plus-core": 0.2.4

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  msgpackr-extract: true
  msw: true
  unrs-resolver: true
  "@shopify/react-native-skia": true
  sharp: true
  simple-git-hooks: true
