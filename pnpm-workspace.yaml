  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.10
  vite-plus: latest
  dotenv: ^17.4.2
  cross-env: ^10.1.0
  drizzle-orm: ^0.45.2
  pg: ^8.21.0
  "@types/pg": ^8.20.0
  hono: ^4.12.23
  "@hono/node-server": ^2.0.4
