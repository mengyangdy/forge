  "@iconify/vue": ^5.0.1
  nprogress: ^0.2.0
  echarts: ^6.1.0
  vue-echarts: ^8.0.1
  "@vitejs/plugin-vue": ^6.0.7
  vite-plugin-svg-icons: ^2.0.1
  "@types/nprogress": ^0.2.3
  "@dylanjs/cli": ^1.0.5
  concurrently: ^10.0.0
  fast-glob: ^3.3.3
  unocss: ^66.7.0
  "@unocss/preset-uno": ^66.7.0
  "@unocss/preset-icons": ^66.7.0
  klona: ^2.0.6
  ioredis: ^5.11.1
  "@scalar/hono-api-reference": ^0.10.20
  "@hono/zod-openapi": ^1.4.0
  bullmq: ^5.78.0
  tailwind-merge: ^3.6.0
  unplugin-icons: ^23.0.1
