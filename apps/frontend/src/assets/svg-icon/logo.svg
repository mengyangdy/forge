<svg width="100%" height="100%" version="1.1" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Polished Silver Steel Gradient for the Anvil Base (Static hex colors for static SVG asset compatibility) -->
    <linearGradient id="SilverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="50%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Hot Plasma / Fire Gradients with absolute hex colors so static SVG renders in full color -->
    <linearGradient id="FlameLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="FlameRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <linearGradient id="FlameCenter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
  </defs>

  <g>
    <!-- 1. The Anvil Base in Polished Silver Steel -->
    <path d="M 180,720 C 220,700 300,740 380,740 H 620 C 700,740 780,700 820,720 C 860,740 860,780 820,800 C 760,830 650,840 500,840 C 350,840 240,830 180,800 C 140,780 140,740 180,720 Z" 
          fill="url(#SilverGrad)" stroke="none" />

    <!-- 2. The Left Flame (Translucent purple backdrop) -->
    <path d="M 280,710 C 200,600 240,400 360,250 C 380,225 410,250 400,290 C 360,450 420,580 480,710 Z" 
          fill="url(#FlameLeft)" opacity="0.8" stroke="none" />

    <!-- 3. The Right Flame (Translucent rose backdrop) -->
    <path d="M 720,710 C 800,600 760,400 640,250 C 620,225 590,250 600,290 C 640,450 580,580 520,710 Z" 
          fill="url(#FlameRight)" opacity="0.8" stroke="none" />

    <!-- 4. The Center F-Flame (The core of the fire, hot-forged into the letter "F") -->
    <path d="M 450,710 C 430,550 440,350 460,220 C 460,220 560,160 680,210 C 700,220 680,260 620,260 C 550,260 500,250 490,360 C 530,330 620,330 650,380 C 660,400 630,420 580,420 C 520,420 480,410 470,520 C 460,600 480,670 490,710 Z" 
          fill="url(#FlameCenter)" opacity="0.95" stroke="none" />
  </g>
</svg>
